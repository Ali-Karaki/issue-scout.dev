name: Refresh cache
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Call refresh endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          SITE_URL=$(jq -r '.url' config/site.json)
          curl -sf -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/refresh"
