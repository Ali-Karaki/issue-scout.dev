name: Refresh cache
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call refresh endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/refresh"
